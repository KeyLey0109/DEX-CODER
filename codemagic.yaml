workflows:
  ios_sideloadly:
    name: iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.nhom4.taskmate"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
      - name: Set iOS bundle identifier
        script: |
          sed -i '' "s/com.nhom4.taskmate/${BUNDLE_ID}/g" ios/Runner.xcodeproj/project.pbxproj
      - name: Build unsigned iOS app
        script: |
          flutter build ios --release --no-codesign
      - name: Package unsigned IPA for Sideloadly
        script: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
          mkdir -p build/ios/ipa
          cd Payload/..
          zip -r build/ios/ipa/TaskMate-unsigned.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
