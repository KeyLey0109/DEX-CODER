name: nhom4_kanbanflow
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0' # Điều chỉnh để tương thích tốt nhất với Flutter hiện tại

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  path: ^1.9.0
  cupertino_icons: ^1.0.8
  
  # State Management & Service Locator
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  dartz: ^0.10.1

  # Storage (Đã tối ưu cho iOS/Android)
  path_provider: ^2.1.5
  sqflite: ^2.4.2 # Chỉ giữ lại bản này cho Mobile

  # Database cho Web/Desktop (Sử dụng có điều kiện)
  # Lưu ý: Codemagic build iOS sẽ bỏ qua các file không liên quan nếu config đúng
  sqflite_common_ffi: ^2.4.0+2
  sqflite_common_ffi_web: ^1.1.1

  # Backend & Core
  supabase_flutter: ^2.12.0
  uuid: ^4.5.3
  google_fonts: ^8.0.2

  # UI & Features
  file_picker: ^10.3.2
  mime: ^2.0.0
  url_launcher: ^6.3.2
  flutter_markdown: ^0.7.3+1
  qr_flutter: ^4.1.0
  share_plus: ^10.1.0
  
  # Notifications (Rất quan trọng cho iOS)
  flutter_local_notifications: ^21.0.0

  # AI
  google_generative_ai: ^0.4.5
  table_calendar: ^3.2.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3 # Cập nhật phiên bản mới nhất

flutter:
  uses-material-design: true

  # Assets khai báo đúng chuẩn
  assets:
    - assets/app_icon.png

# Cấu hình Icons (Nằm ngoài cùng, sát lề trái)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true # Quan trọng cho iOS để tránh lỗi nền đen icon